name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            backend/uv.lock
            backend/pyproject.toml

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check app tests

      - name: Ruff format
        run: uv run ruff format --check app tests

      - name: Mypy
        run: uv run mypy app

      - name: Pytest
        run: uv run pytest tests

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Detect package manager
        id: pm
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "pm=pnpm" >> "$GITHUB_OUTPUT"
            echo "cache=pnpm" >> "$GITHUB_OUTPUT"
            echo "lockfile=frontend/pnpm-lock.yaml" >> "$GITHUB_OUTPUT"
            echo "install=pnpm install --frozen-lockfile" >> "$GITHUB_OUTPUT"
          elif [ -f package-lock.json ]; then
            echo "pm=npm" >> "$GITHUB_OUTPUT"
            echo "cache=npm" >> "$GITHUB_OUTPUT"
            echo "lockfile=frontend/package-lock.json" >> "$GITHUB_OUTPUT"
            echo "install=npm ci" >> "$GITHUB_OUTPUT"
          else
            echo "pm=npm" >> "$GITHUB_OUTPUT"
            echo "cache=" >> "$GITHUB_OUTPUT"
            echo "lockfile=" >> "$GITHUB_OUTPUT"
            echo "install=npm install" >> "$GITHUB_OUTPUT"
          fi

      # setup-node's pnpm cache support needs pnpm on PATH first.
      - name: Enable pnpm (corepack)
        if: steps.pm.outputs.pm == 'pnpm'
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: ${{ steps.pm.outputs.cache }}
          cache-dependency-path: ${{ steps.pm.outputs.lockfile }}

      - name: Install dependencies
        run: ${{ steps.pm.outputs.install }}

      - name: Lint
        run: ${{ steps.pm.outputs.pm }} run lint

      - name: Typecheck
        run: ${{ steps.pm.outputs.pm }} run typecheck

      - name: Test
        run: ${{ steps.pm.outputs.pm }} run test

      - name: Build
        run: ${{ steps.pm.outputs.pm }} run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

  rag-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    env:
      FASTEMBED_CACHE_PATH: /home/runner/.cache/fastembed
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: |
            backend/uv.lock
            backend/pyproject.toml

      - name: Cache fastembed model
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/fastembed
          key: fastembed-BAAI-bge-small-en-v1.5

      - name: Install dependencies
        run: uv sync

      - name: Run RAG evaluation
        run: uv run python -m evals.run_eval --min-hit-rate 0.8 --summary "$GITHUB_STEP_SUMMARY"

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: docmind-api:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          tags: docmind-web:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Validate docker-compose
        run: |
          cp .env.example .env
          docker compose config -q
